<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>l2d-widget demos</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        height: 100%;
      }

      body {
        display: flex;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #333;
        background: #f7f7f7;
      }

      /* ── Sidebar ── */
      .sidebar {
        width: 220px;
        min-height: 100%;
        background: #fff;
        border-right: 1px solid #e5e5e5;
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        padding: 24px 0;
      }

      .sidebar-title {
        font-size: 15px;
        font-weight: 700;
        padding: 0 20px 16px;
        border-bottom: 1px solid #f0f0f0;
        margin-bottom: 12px;
      }

      .sidebar-title span {
        font-weight: 400;
        color: #aaa;
        font-size: 12px;
        margin-left: 6px;
      }

      #demo-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        padding: 0 8px;
      }

      .demo-btn {
        text-align: left;
        padding: 8px 12px;
        border: none;
        background: none;
        border-radius: 6px;
        font-size: 13px;
        color: #555;
        cursor: pointer;
        transition:
          background 0.1s,
          color 0.1s;
      }

      .demo-btn:hover {
        background: #f5f5f5;
        color: #111;
      }

      .demo-btn.active {
        background: #eef2ff;
        color: #4f46e5;
        font-weight: 500;
      }

      .empty {
        font-size: 12px;
        color: #bbb;
        padding: 8px 12px;
      }

      /* ── Main ── */
      .main {
        flex: 1;
        padding: 40px 48px;
      }

      #demo-name {
        font-size: 24px;
        font-weight: 700;
        margin-bottom: 8px;
      }

      #demo-desc {
        font-size: 14px;
        color: #888;
        line-height: 1.6;
      }

      .hint {
        margin-top: 48px;
        font-size: 12px;
        color: #ccc;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-title">l2d-widget <span>demos</span></div>
      <div id="demo-list"></div>
    </aside>

    <main class="main">
      <div id="demo-name"></div>
      <div id="demo-desc"></div>
      <p class="hint">Live2D 模型展示在页面角落 · 修改 src/ 或 demos/ 后热更新自动生效</p>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>
